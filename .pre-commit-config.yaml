# Pre-commit hooks for kproj.
#
# Run locally:
#   uv run pre-commit install      # one-time
#   uv run pre-commit run -a       # ad-hoc full sweep
#
# CI integration deferred per ADR 0007.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
